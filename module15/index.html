<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 15</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    

    <h1>Static Positioning</h1>

    <div id="static"> This div has static positioning</div>

    <h1>Relative Positioning</h1>
    <div id="relative"> This div has relative positioning</div>


    <h1>Fixed Positioning</h1>
    <div id="fixed"> This div has fixed positioning</div>

    <h1>Absolute Positioning</h1>
    <div id="parent">
        <div id="absolute"> This div has absolute positioning</div>
    </div>

    <h1>Sticky Positioning</h1>
    <div id="sticky"> This div has sticky positioning</div>

</body>
</html>
